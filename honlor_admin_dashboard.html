
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#1e1e28;
--border:#2a2a38;--border2:#34344a;
--text:#e8e8f0;--text2:#8888aa;--text3:#4a4a66;
--purple:#7c6aff;--purple2:#9b8cff;--purple3:#1a1730;
--green:#22c97a;--green2:#0d3d24;
--red:#ff4d6a;--red2:#3d0d1a;
--amber:#f5a623;--amber2:#3d2800;
--blue:#3b9eff;--blue2:#0d2a3d;
--font:'Inter',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:600px}
.shell{display:flex;height:100%;min-height:600px}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;padding:16px 0}
.logo{padding:0 16px 20px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);margin-bottom:12px}
.logo-mark{width:28px;height:28px;background:var(--purple);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.logo-name{font-size:14px;font-weight:600;color:var(--text)}
.logo-badge{font-size:9px;background:var(--purple3);color:var(--purple2);padding:1px 6px;border-radius:4px;margin-left:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:12.5px;color:var(--text2);cursor:pointer;transition:all .15s;border-radius:0;position:relative}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--purple2);background:var(--purple3)}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--purple);border-radius:0 2px 2px 0}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nav-icon{width:14px;height:14px;opacity:.7;flex-shrink:0}
.nav-label{flex:1}
.nav-count{font-size:10px;background:var(--red2);color:var(--red);padding:1px 6px;border-radius:10px}
.nav-section{font-size:10px;color:var(--text3);padding:12px 16px 4px;letter-spacing:.08em;text-transform:uppercase}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;background:var(--bg2);flex-shrink:0}
.page-title{font-size:14px;font-weight:500;color:var(--text);flex:1}
.status-pill{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;background:var(--green2);color:var(--green);border:1px solid rgba(34,201,122,.2)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s}
.metric:hover{border-color:var(--border2)}
.metric-label{font-size:10px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.metric-val{font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1}
.metric-change{font-size:11px}
.up{color:var(--green)}
.down{color:var(--red)}
.neu{color:var(--text2)}
.charts-row{display:grid;grid-template-columns:1.6fr 1fr;gap:12px;margin-bottom:20px}
.chart-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:12.5px;font-weight:500;color:var(--text)}
.card-sub{font-size:11px;color:var(--text2)}
.chart-area{height:100px;display:flex;align-items:flex-end;gap:3px}
.bar{flex:1;border-radius:3px 3px 0 0;transition:opacity .2s;cursor:pointer}
.bar:hover{opacity:.7}
.line-svg{width:100%;height:100px}
.bottom-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.bottom-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px}
.feed-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.feed-item:last-child{border-bottom:none}
.feed-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.feed-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:1px}
.feed-time{font-size:10px;color:var(--text2)}
.feed-badge{font-size:9px;padding:1px 6px;border-radius:4px;margin-left:auto;flex-shrink:0}
.badge-new{background:var(--purple3);color:var(--purple2)}
.badge-report{background:var(--red2);color:var(--red)}
.badge-ad{background:var(--amber2);color:var(--amber)}
.table-mini{width:100%;border-collapse:collapse}
.table-mini th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:4px 0 8px;text-align:left;border-bottom:1px solid var(--border)}
.table-mini td{font-size:11.5px;color:var(--text2);padding:7px 0;border-bottom:1px solid var(--border)}
.table-mini tr:last-child td{border-bottom:none}
.table-mini .bold{color:var(--text);font-weight:500}
.ad-bar-bg{height:4px;background:var(--bg4);border-radius:2px;width:60px;margin-top:2px}
.ad-bar-fill{height:4px;background:var(--purple);border-radius:2px}
.health-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.health-row:last-child{border-bottom:none}
.health-name{color:var(--text2)}
.health-val{color:var(--text);font-weight:500;font-size:11px}
.health-ok{color:var(--green)}
.health-warn{color:var(--amber)}
.tab-row{display:flex;gap:2px;margin-bottom:14px}
.tab-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.tab-btn.on{background:var(--bg4);color:var(--text)}
.shimmer{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>

<div class="shell">
  <div class="sidebar">

    <div class="nav-item" onclick="setPage('channels',this)">

    </div>

      <span class="nav-label">Ads</span>
    </div>
    <div class="nav-section">Safety</div>
    <div class="nav-item" onclick="setPage('reports',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M8 2l1.5 4h4l-3.2 2.4 1.2 4L8 10l-3.5 2.4 1.2-4L2.5 6h4z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      <span class="nav-label">Reports</span>
      <span class="nav-count">7</span>
    </div>
    <div class="nav-section">System</div>
    <div class="nav-item" onclick="setPage('notifications',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M8 2a4 4 0 014 4v3l1 2H3l1-2V6a4 4 0 014-4z" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 13a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.5"/></svg>
      <span class="nav-label">Notifications</span>
    </div>
    <div class="nav-item" onclick="setPage('health',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M1 8h3l2-5 2 10 2-6 1 3h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="nav-label">Server health</span>
    </div>
    <div style="flex:1"></div>
    <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px">
      <div class="avatar">SK</div>
      <div>
        <div style="font-size:12px;font-weight:500;color:var(--text)">Sakil</div>
        <div style="font-size:10px;color:var(--text2)">Super admin</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">Overview</div>
      <div class="status-pill"><div class="status-dot"></div>All systems operational</div>
      <div style="font-size:11px;color:var(--text2)">26 Mar 2026</div>
      <div class="avatar">SK</div>
    </div>
    <div class="content" id="content">
    </div>
  </div>
</div>

<script>
const pages = {
overview:`
